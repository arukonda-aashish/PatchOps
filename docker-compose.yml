version: "3.9"

services:
  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: patchops-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-patchops}
      POSTGRES_USER: ${POSTGRES_USER:-patchops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patchops_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-patchops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patchops-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-patchops}:${POSTGRES_PASSWORD:-patchops_secret}@postgres:5432/${POSTGRES_DB:-patchops}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./config:/app/config:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker (Agent Orchestrator) ───────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patchops-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-patchops}:${POSTGRES_PASSWORD:-patchops_secret}@postgres:5432/${POSTGRES_DB:-patchops}
      REDIS_URL: redis://redis:6379/0
      IS_CELERY_WORKER: "true"
    volumes:
      - ./backend:/app
      - ./config:/app/config:ro
      - ./scripts/powershell:/app/scripts/powershell:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4 -Q patchops

  # ─── Celery Beat (Scheduler) ──────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patchops-beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-patchops}:${POSTGRES_PASSWORD:-patchops_secret}@postgres:5432/${POSTGRES_DB:-patchops}
      REDIS_URL: redis://redis:6379/0
      IS_CELERY_WORKER: "true"
    volumes:
      - ./backend:/app
      - ./config:/app/config:ro
    depends_on:
      - redis
    command: celery -A app.worker.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler

  # ─── Redis (Broker + Cache) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: patchops-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── React Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: patchops-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: patchops-network
